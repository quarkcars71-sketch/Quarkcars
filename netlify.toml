# NOTE: Netlify only supports STATIC sites (HTML/CSS/JS)
# Laravel requires PHP server-side processing which Netlify cannot handle
#
# For Laravel deployment, use Render.com (FREE) - https://render.com
# This project is configured for Render deployment via render.yaml

[build]
  command = "echo 'Laravel requires PHP hosting. Use Render.com instead.' && exit 1"
  publish = "public"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
